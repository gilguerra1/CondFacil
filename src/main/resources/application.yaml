spring:
  application:
    name: CondoFacil

  datasource:
    url: jdbc:postgresql://localhost:5432/CondFacil?useTimezone=true&serverTimezone=UTC
    username: postgres
    password: 123

  # MUDANÇA AQUI: Vamos desativar a validação do JPA por UM SEGUNDO
  # para ver se o Flyway acorda e cria as tabelas.
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    check-location: true

server:
  port: 8080

logging:
  level:
    root: WARN